name: Feature request
description: 새로운 기능 추가 제안
title: "[Feature] "
labels: ["enhancement", "feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 제안하는 기능 요약
      description: 어떤 기능을 추가하고 싶은지 간단히 적어주세요.
      placeholder: 예: 사용자 프로필에 다크 모드 지원 추가
  - type: textarea
    id: details
    attributes:
      label: 상세 설명
      description: 기능이 어떻게 동작하면 좋을지 구체적으로 설명해주세요.
      placeholder: 예: 설정 메뉴에서 테마를 선택할 수 있도록 옵션 추가
  - type: textarea
    id: benefit
    attributes:
      label: 기대 효과
      description: 이 기능이 추가되면 어떤 점이 좋아지는지 적어주세요.
      placeholder: 예: 사용자 경험 개선 및 접근성 향상
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 링크, 스크린샷, 다른 서비스 사례가 있다면 첨부해주세요.
