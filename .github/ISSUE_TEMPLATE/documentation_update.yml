name: Documentation update
description: "문서화 관련 작업 요청/제안"
title: "[Docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: summary
    attributes:
      label: "변경/추가할 문서 요약"
      description: "어떤 문서를 수정하거나 추가해야 하는지 간단히 적어주세요."
      placeholder: "예: API 사용법 문서에 새로운 엔드포인트 추가"
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: "상세 설명"
      description: "문서에 어떤 내용을 반영해야 하는지 구체적으로 설명해주세요."
      placeholder: "예: TJ/KY 노래방 API 엔드포인트 설명 및 예제 코드 추가"
    validations:
      required: true
